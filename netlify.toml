[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Ensure static files (including videos) are properly served
[[headers]]
  for = "/Home_video.mp4"
  [headers.values]
    Content-Type = "video/mp4"
    Cache-Control = "public, max-age=31536000, immutable"

# Handle large video files
[[redirects]]
  from = "/Home_video.mp4"
  to = "/Home_video.mp4"
  status = 200